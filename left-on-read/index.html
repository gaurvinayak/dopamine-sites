  #message-input {

  .send-btn {
    width: 44px;

  /* Char hint */
  .char-hint {

    padding: 5px 12px;

    margin-bottom: 12px;
  }

  /* Scroll anchor */

</style>

<div id="app">

<script>
// ─── State ───────────────────────────────────────────────────────────────────
let recipient = { name: 'Alex', color: '#e05260', emoji: '💔' };
let selectedPresetBtn = null;
let messageSent = false;
let sentMsgEl = null;
let tickEl = null;

const COUNTER = Math.floor(Math.random() * 601) + 800; // 800–1400

// Outcomes
const OUTCOMES = ['left_on_read', 'delivered_not_read', 'not_saved', 'blocked'];

function pickOutcome() {
  // Weighted: left on read most common
  const w = [0.45, 0.25, 0.15, 0.15];
  const r = Math.random();
  let acc = 0;
  for (let i = 0; i < w.length; i++) {
    acc += w[i];
    if (r < acc) return OUTCOMES[i];
  }
  return OUTCOMES[0];
}

// ─── Setup Screen ─────────────────────────────────────────────────────────────
function selectPreset(btn) {
  if (selectedPresetBtn) selectedPresetBtn.classList.remove('active');
  btn.classList.add('active');
  selectedPresetBtn = btn;

  recipient = {
    name: btn.dataset.name,
    color: btn.dataset.color,
    emoji: btn.dataset.emoji
  };

  document.getElementById('custom-name').value = '';
  document.getElementById('continue-btn').disabled = false;
}

function onCustomNameInput() {
  const val = document.getElementById('custom-name').value.trim();
  if (selectedPresetBtn) {
    selectedPresetBtn.classList.remove('active');
    selectedPresetBtn = null;
  }
  if (val.length > 0) {
    recipient = {
      name: val,
      color: '#607d8b',
      emoji: '✉️'
    };
    document.getElementById('continue-btn').disabled = false;
  } else {
    document.getElementById('continue-btn').disabled = true;
  }
}

function startChat() {
  // Build the chat
  buildChatHistory();
  updateHeader();

  const setup = document.getElementById('setup-screen');
  const chat = document.getElementById('chat-screen');

  setup.classList.add('hidden');
  setTimeout(() => {
    setup.style.display = 'none';
    chat.classList.add('visible');
  }, 400);
}

function goBack() {
  const setup = document.getElementById('setup-screen');
  const chat = document.getElementById('chat-screen');

  chat.classList.remove('visible');
  setup.style.display = 'flex';
  setTimeout(() => setup.classList.remove('hidden'), 20);

  // Reset
  messageSent = false;
  sentMsgEl = null;
  tickEl = null;
  document.getElementById('aftermath').remove?.();
  document.getElementById('message-input').value = '';
  onInputChange();
}

// ─── Header ───────────────────────────────────────────────────────────────────
function updateHeader() {
  const av = document.getElementById('header-avatar');
  av.textContent = recipient.name.charAt(0).toUpperCase();
  av.style.background = recipient.color;
  document.getElementById('header-name').textContent = recipient.name;
}

// ─── Chat History ─────────────────────────────────────────────────────────────
function buildChatHistory() {
  const container = document.getElementById('chat-messages');

  // Clear except scroll anchor
  const anchor = document.getElementById('scroll-anchor');
  container.innerHTML = '';
  container.appendChild(anchor);

  const histories = [
    [
      { type: 'date', text: '3 weeks ago' },
      { type: 'sent', text: 'Hey', time: '7:14 PM', ticks: 'read' },
      { type: 'date', text: 'Last week' },
      { type: 'sent', text: '...', time: '11:02 PM', ticks: 'read' },
      { type: 'date', text: 'Today' },
    ],
    [
      { type: 'date', text: '2 months ago' },
      { type: 'received', text: 'I\'ll text you later 👍', time: '3:45 PM' },
      { type: 'date', text: 'Today' },
    ],
    [
      { type: 'date', text: 'Last month' },
      { type: 'sent', text: 'Miss you', time: '9:31 PM', ticks: 'read' },
      { type: 'date', text: 'Today' },
    ],
    [
      { type: 'date', text: 'Today' },
    ],
  ];

  const history = histories[Math.floor(Math.random() * histories.length)];

  history.forEach(item => {
    if (item.type === 'date') {
      const sep = document.createElement('div');
      sep.className = 'date-sep';
      sep.innerHTML = `<span>${item.text}</span>`;
      container.insertBefore(sep, anchor);
    } else if (item.type === 'sent') {
      const row = makeBubble('sent', item.text, item.time, item.ticks || 'read');
      container.insertBefore(row, anchor);
    } else if (item.type === 'received') {
      const row = makeBubble('received', item.text, item.time, null);
      container.insertBefore(row, anchor);
    }
  });

  // Add aftermath placeholder
  const aftermath = document.createElement('div');
  aftermath.id = 'aftermath';
  container.insertBefore(aftermath, anchor);

  scrollToBottom();
}

function makeBubble(direction, text, time, tickState) {
  const row = document.createElement('div');
  row.className = `msg-row ${direction}`;

  const bubble = document.createElement('div');
  bubble.className = `bubble ${direction}`;

  const textEl = document.createElement('div');
  textEl.className = 'bubble-text';
  textEl.textContent = text;

  const meta = document.createElement('div');
  meta.className = 'bubble-meta';

  const timeEl = document.createElement('span');
  timeEl.className = 'bubble-time';
  timeEl.textContent = time;
  meta.appendChild(timeEl);

  if (direction === 'sent') {
    const tick = document.createElement('span');
    tick.className = `tick ${tickState || 'sent'}`;
    tick.innerHTML = tickSVG();
    meta.appendChild(tick);
  }

  bubble.appendChild(textEl);
  bubble.appendChild(meta);
  row.appendChild(bubble);
  return row;
}

function tickSVG() {
  // Double check mark like WhatsApp
  return `<svg viewBox="0 0 16 11" xmlns="http://www.w3.org/2000/svg">
    <path d="M11.071.653a.75.75 0 00-1.142-.974L4.5 6.364 2.121 3.985a.75.75 0 00-1.06 1.06l3 3a.75.75 0 001.1-.043l6-7z"/>
    <path d="M15.071.653a.75.75 0 00-1.142-.974L8.5 6.364 7.621 5.485a.75.75 0 00-1.06 1.06l1.5 1.5a.75.75 0 001.1-.043l6-7z" opacity="0.7"/>
  </svg>`;
}

// ─── Input handling ───────────────────────────────────────────────────────────
let hintTimer = null;
let charCount = 0;

function onInputChange() {
  const input = document.getElementById('message-input');
  const sendBtn = document.getElementById('send-btn');
  const hint = document.getElementById('char-hint');

  // Auto resize textarea
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 100) + 'px';

  const hasText = input.value.trim().length > 0;
  charCount = input.value.length;

  if (hasText) {
    sendBtn.className = 'send-btn plane-mode';
  } else {
    sendBtn.className = 'send-btn mic-mode';
  }

  // Show hint at certain character counts
  if (charCount > 0 && charCount % 40 === 0) {
    hint.classList.add('show');
    clearTimeout(hintTimer);
    hintTimer = setTimeout(() => hint.classList.remove('show'), 3000);
  }
}

function onKeyDown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    const input = document.getElementById('message-input');
    if (input.value.trim().length > 0 && !messageSent) {
      handleSend();
    }
  }
}

function insertEmoji() {
  // Noop — just for decoration
}

// ─── Send flow ────────────────────────────────────────────────────────────────
function handleSend() {
  if (messageSent) return;
  const input = document.getElementById('message-input');
  const text = input.value.trim();
  if (!text) return;

  messageSent = true;
  input.disabled = true;
  input.value = '';
  input.style.height = 'auto';

  const sendBtn = document.getElementById('send-btn');
  sendBtn.className = 'send-btn mic-mode';
  sendBtn.disabled = true;

  const hint = document.getElementById('char-hint');
  hint.classList.remove('show');

  sendMessage(text);
}

function sendMessage(text) {
  const now = new Date();
  const time = now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });

  const container = document.getElementById('chat-messages');
  const anchor = document.getElementById('scroll-anchor');
  const aftermath = document.getElementById('aftermath');

  // Create sent bubble
  const row = document.createElement('div');
  row.className = 'msg-row sent';

  const bubble = document.createElement('div');
  bubble.className = 'bubble sent';

  const textEl = document.createElement('div');
  textEl.className = 'bubble-text';
  textEl.textContent = text;

  const meta = document.createElement('div');
  meta.className = 'bubble-meta';

  const timeEl = document.createElement('span');
  timeEl.className = 'bubble-time';
  timeEl.textContent = time;
  meta.appendChild(timeEl);

  tickEl = document.createElement('span');
  tickEl.className = 'tick sent';
  tickEl.innerHTML = tickSVG();
  meta.appendChild(tickEl);

  bubble.appendChild(textEl);
  bubble.appendChild(meta);
  row.appendChild(bubble);

  sentMsgEl = row;
  container.insertBefore(row, aftermath);
  scrollToBottom();

  // Tick progression: sent → delivered
  setTimeout(() => {
    tickEl.className = 'tick delivered';
    scrollToBottom();
  }, 1000);

  // Show typing indicator
  setTimeout(() => showTyping(), 2200);

  // Run outcome
  const outcome = pickOutcome();
  setTimeout(() => resolveOutcome(outcome, time), 6500);
}

function showTyping() {
  const container = document.getElementById('chat-messages');
  const anchor = document.getElementById('scroll-anchor');
  const aftermath = document.getElementById('aftermath');

  const typingRow = document.createElement('div');
  typingRow.id = 'typing-row';
  typingRow.className = 'msg-row received visible';

  const av = document.createElement('div');
  av.className = 'typing-avatar';
  av.style.background = recipient.color;
  av.textContent = recipient.name.charAt(0).toUpperCase();

  const bubble = document.createElement('div');
  bubble.className = 'typing-bubble';
  bubble.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';

  typingRow.appendChild(av);
  typingRow.appendChild(bubble);
  container.insertBefore(typingRow, aftermath);
  scrollToBottom();
}

function removeTyping() {
  const t = document.getElementById('typing-row');
  if (t) t.remove();
}

// ─── Outcomes ─────────────────────────────────────────────────────────────────
function resolveOutcome(outcome, sentTime) {
  removeTyping();

  switch (outcome) {
    case 'left_on_read':
      doLeftOnRead(sentTime);
      break;
    case 'delivered_not_read':
      doDeliveredNotRead();
      break;
    case 'not_saved':
      doNotSaved();
      break;
    case 'blocked':
      doBlocked();
      break;
  }
}

function doLeftOnRead(sentTime) {
  // Blue ticks
  if (tickEl) {
    tickEl.className = 'tick read';
  }

  // Update header status
  const status = document.getElementById('header-status');
  status.textContent = `Read ${sentTime}`;

  setTimeout(() => {
    showAftermath('Some things are better said here. 💙', false, false);
  }, 3000);
}

function doDeliveredNotRead() {
  // Gray ticks stay
  setTimeout(() => {
    showAftermath('Message delivered. To this void.', false, false);
  }, 2000);
}

function doNotSaved() {
  addSystemMsg('This number is not in your contacts.', true);
  setTimeout(() => {
    showAftermath('Maybe that\'s okay.', false, false);
  }, 2000);
}

function doBlocked() {
  addSystemMsg('Message not delivered.', true);
  setTimeout(() => {
    showAftermath('You said it. That\'s enough.', false, false);
  }, 2000);
}

function addSystemMsg(text, danger) {
  const container = document.getElementById('chat-messages');
  const aftermath = document.getElementById('aftermath');

  const div = document.createElement('div');
  div.className = `system-msg${danger ? ' danger' : ''}`;
  div.innerHTML = `<span>${text}</span>`;
  container.insertBefore(div, aftermath);
  scrollToBottom();
}

// ─── Aftermath ────────────────────────────────────────────────────────────────
function showAftermath(msg, feelGood, deleted) {
  const aftermath = document.getElementById('aftermath');

  aftermath.innerHTML = `
    <p class="aftermath-text">${msg}</p>
    <div class="aftermath-actions">
      <button class="action-btn" onclick="resetChat()">Send another</button>
      <button class="action-btn" onclick="feelGoodAction(this)">That felt good 🫂</button>
      <button class="action-btn delete-btn" onclick="deleteMessage()">Delete and pretend</button>
    </div>
    <p class="counter-line">💙 ${COUNTER.toLocaleString()} people sent unsendable messages today</p>
  `;

  aftermath.classList.add('visible');
  scrollToBottom();
}

function feelGoodAction(btn) {
  btn.textContent = '🫂 It really did.';
  btn.style.color = 'var(--green)';
  btn.style.borderColor = 'var(--green)';
  btn.onclick = null;
}

function deleteMessage() {
  if (!sentMsgEl) return;

  const bubble = sentMsgEl.querySelector('.bubble');
  if (bubble) {
    bubble.classList.add('deleted');
    setTimeout(() => {
      sentMsgEl.remove();
      sentMsgEl = null;
    }, 350);
  }

  // Update aftermath
  const aftermath = document.getElementById('aftermath');
  const text = aftermath.querySelector('.aftermath-text');
  if (text) text.textContent = 'Gone. Like it never happened. 🌫️';

  // Disable delete btn
  const delBtn = aftermath.querySelector('.delete-btn');
  if (delBtn) {
    delBtn.textContent = 'Deleted ✓';
    delBtn.style.color = 'var(--meta)';
    delBtn.onclick = null;
  }

  scrollToBottom();
}

function resetChat() {
  messageSent = false;
  sentMsgEl = null;
  tickEl = null;

  const input = document.getElementById('message-input');
  const sendBtn = document.getElementById('send-btn');
  input.disabled = false;
  sendBtn.disabled = false;
  sendBtn.className = 'send-btn mic-mode';

  document.getElementById('header-status').textContent = 'last seen today at 2:17 PM';

  buildChatHistory();
  input.focus();
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
function scrollToBottom() {
  const container = document.getElementById('chat-messages');
  requestAnimationFrame(() => {
    container.scrollTop = container.scrollHeight;
  });
}

// Init: disable continue button
document.getElementById('continue-btn').disabled = true;
</script>
