  .ticket-id {
    font-size: 11px;
    font-weight: 600;

  .ticket-type-icon {

    vertical-align: middle;
    flex-shrink: 0;

  /* ===== ZERO OVERLAY ===== */
  #zero-overlay {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    opacity: 0;
    pointer-events: none;
    overflow: hidden;
  }
  #zero-overlay.show {
    pointer-events: all;
  }

  .zero-circle {
    position: absolute;
    width: 0;
    height: 0;
    background: #00C851;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    top: 50%;
    left: 50%;

  .zero-content {
    position: relative;
    z-index: 2;
    text-align: center;
    color: white;
    padding: 24px;
    opacity: 0;
    transform: scale(0.8);
    transition: opacity 0.4s ease 0.6s, transform 0.4s cubic-bezier(0.34,1.56,0.64,1) 0.6s;
  }
  #zero-overlay.show .zero-content {
    opacity: 1;
    transform: scale(1);
  }

  .zero-icon {
    font-size: 72px;
    margin-bottom: 12px;
    animation: zeroIconBounce 0.6s cubic-bezier(0.34,1.56,0.64,1) 0.8s both;

    from { transform: scale(0); opacity: 0; }

  .zero-title {
    font-size: 52px;
    font-weight: 900;
    font-family: 'Google Sans', sans-serif;
    letter-spacing: -2px;
    line-height: 1;
    margin-bottom: 8px;

  .zero-subtitle {

  .zero-cleared {

  .zero-twist {

  #zero-overlay.show .zero-twist { opacity: 1; transform: translateY(0); }

  .zero-btn-row {

    justify-content: center;
    opacity: 0;
    transition: opacity 0.4s ease 3.2s;

  .zero-btn {
    background: white;
    color: #1A7F37;
    border: none;
    padding: 10px 22px;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 700;
    font-family: 'Google Sans', sans-serif;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;

  .zero-btn:hover { transform: scale(1.04); box-shadow: 0 4px 16px rgba(0,0,0,0.2); }

  .zero-session-count {
    margin-top: 28px;
    font-size: 13px;
    opacity: 0.7;
    font-family: 'Roboto', sans-serif;

  /* ===== CONFETTI ===== */
  .confetti-piece {
    position: fixed;
    width: 8px;
    height: 10px;
    pointer-events: none;
    z-index: 1001;
    border-radius: 1px;
    animation: confettiFall linear forwards;
  }
  @keyframes confettiFall {
    0% { transform: translateY(-20px) rotate(0deg) scaleX(1); opacity: 1; }
    80% { opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg) scaleX(-1); opacity: 0; }
  }

  /* ===== ARCHIVE ALL ANIMATION ===== */
  @keyframes whooshAll {
    0% { transform: translateX(0); opacity: 1; }

  /* ===== MISC ===== */
  .stat-bar {
    background: white;

  /* Swiping styles */

  /* scrollbar */

  #inbox-list::-webkit-scrollbar-thumb:hover { background: #aaa; }

  /* Jira mode overrides */
  body.jira-mode .sender { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; }

  @keyframes archiveFlash {
    0% { background: rgba(26,127,55,0.12); }

function getAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  }
  return audioCtx;
}

function playPop(pitch = 440, type = 'sine', duration = 0.08) {
  const ctx = getAudio(); if (!ctx) return;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.type = type;
  osc.frequency.setValueAtTime(pitch, ctx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(pitch * 1.4, ctx.currentTime + 0.03);
  osc.frequency.exponentialRampToValueAtTime(pitch * 0.5, ctx.currentTime + duration);
  gain.gain.setValueAtTime(0.18, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
  osc.start(ctx.currentTime);
  osc.stop(ctx.currentTime + duration);
}

function playWhoosh() {
  const ctx = getAudio(); if (!ctx) return;
  const bufSize = ctx.sampleRate * 0.3;
  const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i/bufSize);
  const src = ctx.createBufferSource();
  const filt = ctx.createBiquadFilter();
  const gain = ctx.createGain();
  src.buffer = buf;
  filt.type = 'bandpass'; filt.frequency.value = 600; filt.Q.value = 0.5;
  src.connect(filt); filt.connect(gain); gain.connect(ctx.destination);
  gain.gain.setValueAtTime(0.3, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
  src.start(); src.stop(ctx.currentTime + 0.3);
}

function playZeroThud() {
  const ctx = getAudio(); if (!ctx) return;
  // Deep thud
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.type = 'sine';
  osc.frequency.setValueAtTime(80, ctx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(40, ctx.currentTime + 0.3);
  gain.gain.setValueAtTime(0.6, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
  osc.start(ctx.currentTime);
  osc.stop(ctx.currentTime + 0.5);
  // High chime
  setTimeout(() => {
    const o2 = ctx.createOscillator();
    const g2 = ctx.createGain();
    o2.connect(g2); g2.connect(ctx.destination);
    o2.type = 'sine'; o2.frequency.value = 880;
    g2.gain.setValueAtTime(0.3, ctx.currentTime);
    g2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.8);
    o2.start(); o2.stop(ctx.currentTime + 0.8);
    const o3 = ctx.createOscillator();
    const g3 = ctx.createGain();
    o3.connect(g3); g3.connect(ctx.destination);
    o3.type = 'sine'; o3.frequency.value = 1320;
    g3.gain.setValueAtTime(0.2, ctx.currentTime + 0.15);
    g3.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.9);
    o3.start(ctx.currentTime + 0.15); o3.stop(ctx.currentTime + 0.9);
  }, 100);
}

function getAvatarText(item) {
  if (mode === 'jira') return item.avatar;
  const s = item.sender;
  if (s.includes('@')) return s[0].toUpperCase();
  return s.substring(0, 2).toUpperCase();
}

function renderGmailItem(item, idx) {
  const el = document.createElement('div');
  el.className = 'email-item' + (item.read ? ' is-read' : '');
  el.dataset.idx = idx;

  const importantLabel = item.important ? `<span class="label-important">★ IMP</span>` : '';
  const avatarText = getAvatarText(item);

  el.innerHTML = `
    <div class="swipe-bg"><span>✓ Archive</span></div>
    <div class="email-check">
      <div class="check-circle" onclick="toggleCheck(event, ${idx})">✓</div>
    </div>
    <div class="email-avatar" style="background:${item.color}">${avatarText}</div>
    <div class="email-body">
      <div class="email-top-row">
        <span class="sender">${escHtml(item.sender)}</span>
        <div class="email-meta">
          ${importantLabel}
          <span class="email-time">${item.time}</span>
        </div>
      </div>
      <div class="subject">${escHtml(item.subject)}</div>
      <div class="snippet">${escHtml(item.snippet)}</div>
    </div>
  `;

  attachSwipe(el, idx);
  el.addEventListener('click', (e) => {
    if (e.target.closest('.check-circle')) return;
    archiveSingle(idx);
  });
  return el;
}

function getJiraTypeIcon(type) {
  const map = {
    bug:    { bg: '#EA4335', icon: '🐛' },
    task:   { bg: '#1A73E8', icon: '✓' },
    story:  { bg: '#34A853', icon: '◆' },
    epic:   { bg: '#9C27B0', icon: '⚡' },
    review: { bg: '#FA7B17', icon: '◉' },
    event:  { bg: '#0052CC', icon: '📅' },
  };
  return map[type] || map.task;
}

function getPrioLabel(prio) {
  const cl = { P0: 'label-p0', P1: 'label-p1', P2: 'label-p2', P3: '' }[prio] || '';
  return cl ? `<span class="${cl}">${prio}</span>` : '';
}

  const typeInfo = getJiraTypeIcon(item.type);
  const avatarText = item.avatar;
  const prioLabel = getPrioLabel(item.prio);

  el.innerHTML = `
    <div class="swipe-bg"><span>✓ Done</span></div>
    <div class="email-check">
      <div class="check-circle" onclick="toggleCheck(event, ${idx})">✓</div>
    </div>
    <div class="email-avatar" style="background:${item.color}; border-radius:4px">${avatarText}</div>
    <div class="email-body">
      <div class="email-top-row">
        <span class="sender" style="font-family:monospace;font-size:12px;color:#0052CC">${item.id}</span>
        <div class="email-meta">
          ${prioLabel}
          <span class="email-time">${item.updated}</span>
        </div>
      </div>
      <div class="subject">${escHtml(item.summary)}</div>
      <div class="snippet">
        <span style="display:inline-flex;align-items:center;gap:3px">
          <span style="background:${typeInfo.bg};color:white;padding:0 4px;border-radius:2px;font-size:10px;font-weight:600">${item.type.toUpperCase()}</span>
          <span>Assigned to: ${item.assignee}</span>
        </span>
      </div>
    </div>
  `;

  attachSwipe(el, idx);
  el.addEventListener('click', (e) => {
    if (e.target.closest('.check-circle')) return;
    archiveSingle(idx);
  });
  return el;
}

function renderInbox() {
  const list = document.getElementById('inbox-list');
  list.innerHTML = '';
  const section = document.createElement('div');
  section.className = 'inbox-section-label';
  section.textContent = mode === 'gmail' ? 'Primary' : 'My Issues';
  list.appendChild(section);

  items.forEach((item, idx) => {
    if (item.archived) return;
    const el = mode === 'gmail' ? renderGmailItem(item, idx) : renderJiraItem(item, idx);
    list.appendChild(el);
  });

  updateCounter();
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─────────────────────────────────────────────
// SWIPE
// ─────────────────────────────────────────────
function attachSwipe(el, idx) {
  let startX = null, curX = 0, dragging = false;
  const THRESHOLD = 90;

  function onDown(e) {
    startX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
    dragging = false;
    curX = 0;
  }
  function onMove(e) {
    if (startX === null) return;
    const x = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
    const dx = startX - x;
    if (dx < 5) return;
    dragging = true;
    curX = dx;
    el.style.transform = `translateX(${-dx}px)`;
    const swipeBg = el.querySelector('.swipe-bg');
    swipeBg.style.opacity = Math.min(dx / THRESHOLD, 1).toString();
    if (e.type === 'touchmove') e.preventDefault();
  }
  function onUp() {
    if (dragging && curX > THRESHOLD) {
      el.style.transform = '';
      archiveSingle(idx);
    } else {
      el.style.transform = '';
      const swipeBg = el.querySelector('.swipe-bg');
      if (swipeBg) swipeBg.style.opacity = '0';
    }
    startX = null; dragging = false; curX = 0;
  }

  el.addEventListener('mousedown', onDown);
  el.addEventListener('mousemove', onMove);
  el.addEventListener('mouseup', onUp);
  el.addEventListener('mouseleave', onUp);
  el.addEventListener('touchstart', onDown, { passive: true });
  el.addEventListener('touchmove', onMove, { passive: false });
  el.addEventListener('touchend', onUp);
}

// ─────────────────────────────────────────────
// ARCHIVE LOGIC
// ─────────────────────────────────────────────
function archiveSingle(idx) {
  if (items[idx].archived) return;
  const el = document.querySelector(`.email-item[data-idx="${idx}"]`);
  if (!el) return;

  playPop(520 + Math.random() * 80, 'sine', 0.09);

  items[idx].archived = true;
  archivedCount++;

  el.classList.add('archiving');
  el.addEventListener('animationend', () => {
    el.remove();
    checkZero();
  }, { once: true });

  if (selectedItem === idx) selectedItem = null;
  updateCounter();
}

function toggleCheck(e, idx) {
  e.stopPropagation();
  const el = document.querySelector(`.email-item[data-idx="${idx}"]`);
  if (!el) return;
  if (selectedItem === idx) {
    el.classList.remove('checked');
    selectedItem = null;
  } else {
    if (selectedItem !== null) {
      const prev = document.querySelector(`.email-item[data-idx="${selectedItem}"]`);
      if (prev) prev.classList.remove('checked');
    }
    el.classList.add('checked');
    selectedItem = idx;
    playPop(600, 'sine', 0.06);
  }
}

function archiveAll() {
  playWhoosh();
  const els = document.querySelectorAll('.email-item:not(.archiving)');
  let delay = 0;
  els.forEach((el) => {
    const idx = parseInt(el.dataset.idx);
    setTimeout(() => {
      if (items[idx] && !items[idx].archived) {
        items[idx].archived = true;
        archivedCount++;
        el.style.animation = `whooshAll 0.35s cubic-bezier(0.4,0,1,1) ${delay * 0}ms forwards`;
        el.style.animationFillMode = 'forwards';
        el.style.opacity = '0';
        el.style.maxHeight = '0';
        el.style.overflow = 'hidden';
        el.style.transition = 'max-height 0.3s ease, opacity 0.2s ease';
        updateCounter();
      }
    }, delay * 30);
    delay++;
  });
  setTimeout(() => {
    document.querySelectorAll('.email-item').forEach(e => e.remove());
    checkZero();
  }, delay * 30 + 400);
}

function checkZero() {
  const remaining = items.filter(i => !i.archived).length;
  if (remaining === 0) {
    setTimeout(triggerInboxZero, 200);
  }
}

// ─────────────────────────────────────────────
// COUNTER & PROGRESS
// ─────────────────────────────────────────────
function updateCounter() {
  const remaining = items.filter(i => !i.archived).length;
  const pct = (archivedCount / TOTAL) * 100;

  const countEl = document.getElementById('count-display');
  countEl.textContent = remaining;
  countEl.classList.remove('pop');
  void countEl.offsetWidth;
  countEl.classList.add('pop');

  const fill = document.getElementById('progress-fill');
  fill.style.width = pct + '%';

  // Color shift
  const g = Math.round((pct / 100) * 200);
  fill.style.background = `rgb(${255 - g}, 255, ${255 - g/2})`;

  const label = document.getElementById('progress-label');
  if (pct >= 90) {
    label.textContent = 'Almost... keep going.';
  } else if (pct >= 50) {
    label.textContent = 'Halfway there. You\'ve got this.';
  } else if (pct > 0) {
    label.textContent = `${Math.round(pct)}% cleared`;
  } else {
    label.textContent = '';
  }
}

// ─────────────────────────────────────────────
// INBOX ZERO MOMENT
// ─────────────────────────────────────────────
function triggerInboxZero() {
  zeroCount++;
  localStorage.setItem('inboxZeroCount', zeroCount);
  updateSessionStat();

  playZeroThud();

  const overlay = document.getElementById('zero-overlay');
  const circle = document.getElementById('zero-circle');

  overlay.style.opacity = '1';
  overlay.classList.add('show');

  // Expand circle
  const size = Math.max(window.innerWidth, window.innerHeight) * 3;
  circle.style.transition = 'width 0.8s cubic-bezier(0.4,0,0.2,1), height 0.8s cubic-bezier(0.4,0,0.2,1)';
  circle.style.width = size + 'px';
  circle.style.height = size + 'px';

  // Update content
  document.getElementById('zero-cleared').textContent =
    `You cleared ${TOTAL} fake ${mode === 'gmail' ? 'emails' : 'tickets'}.`;
  document.getElementById('zero-twist').innerHTML = mode === 'gmail'
    ? `Your real inbox still has <strong>1,203 unread.</strong> 🙂`
    : `Your real Jira has <strong>847 open tickets.</strong> Touch grass.`;
  document.getElementById('zero-subtitle').textContent =
    mode === 'gmail' ? 'You actually did it.' : 'All clear. Theoretically.';

  const zsc = document.getElementById('zero-session-count');
  zsc.textContent = `Inbox zero achieved ${zeroCount} time${zeroCount === 1 ? '' : 's'} today`;

  // Confetti
  setTimeout(launchConfetti, 600);
}

function launchConfetti() {
  const colors = ['#00C851','#ffffff','#69F0AE','#B9F6CA','#CCFF90','#F1F8E9'];
  for (let i = 0; i < 80; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + 'vw';
    piece.style.top = '-10px';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.width = (6 + Math.random() * 8) + 'px';
    piece.style.height = (8 + Math.random() * 10) + 'px';
    piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    piece.style.animationDuration = (1.5 + Math.random() * 2) + 's';
    piece.style.animationDelay = (Math.random() * 0.8) + 's';
    document.body.appendChild(piece);
    piece.addEventListener('animationend', () => piece.remove());
  }
}

function restartFromZero() {
  const overlay = document.getElementById('zero-overlay');
  const circle = document.getElementById('zero-circle');
  overlay.style.opacity = '0';
  overlay.classList.remove('show');
  setTimeout(() => {
    circle.style.transition = 'none';
    circle.style.width = '0';
    circle.style.height = '0';
  }, 300);
  setTimeout(initInbox, 350);
}

// ─────────────────────────────────────────────
// MODE & INIT
// ─────────────────────────────────────────────
function setMode(m) {
  mode = m;
  document.body.classList.toggle('jira-mode', m === 'jira');
  document.getElementById('btn-gmail').classList.toggle('active', m === 'gmail');
  document.getElementById('btn-jira').classList.toggle('active', m === 'jira');
  document.getElementById('logo-icon').textContent = m === 'gmail' ? 'M' : 'J';
  document.getElementById('logo-text').textContent = m === 'gmail' ? 'Gmail' : 'Jira';
  document.getElementById('count-label').textContent = m === 'gmail' ? 'unread' : 'open tickets';
  initInbox();
}

function initInbox() {
  const sourceData = mode === 'gmail' ? GMAIL_ITEMS : JIRA_ITEMS;
  items = sourceData.map(d => ({ ...d, archived: false, read: false }));
  archivedCount = 0;
  selectedItem = null;
  renderInbox();
  updateCounter();
}

function restartInbox() {
  getAudio(); // unlock audio context on user gesture
  playPop(300, 'sine', 0.12);
  initInbox();
}

function updateSessionStat() {
  const el = document.getElementById('session-stat');
  el.innerHTML = `Inbox zero achieved <strong>${zeroCount}</strong> time${zeroCount === 1 ? '' : 's'} today`;
}

// ─────────────────────────────────────────────
// KEYBOARD
// ─────────────────────────────────────────────
document.addEventListener('keydown', (e) => {
  if (e.key === 'e' || e.key === 'E') {
    if (selectedItem !== null) {
      archiveSingle(selectedItem);
    } else {
      // Archive topmost
      const first = items.findIndex(i => !i.archived);
      if (first !== -1) archiveSingle(first);
    }
  }
});

// ─────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────
updateSessionStat();
initInbox();
</script>
